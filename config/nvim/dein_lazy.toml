

[[plugins]]
repo = 'cespare/vim-toml'
on_ft = 'toml'

[[plugins]]
repo = 'dense-analysis/ale'
on_ft = ['html','css','python']
hook_add = '''
source ~/.config/nvim/plugins/ale.vim
'''

[[plugins]]
repo = 'psf/black'
on_ft = ['py']
hook_add = '''
source ~/.config/nvim/plugins/black.vim
'''

[[plugins]]
repo = 'mattn/ctrlp-matchfuzzy'
depends = ['Ctrlp']
hook_add = '''
source ~/.config/nvim/plugins/ctrlp-matchfuzzy.vim
'''

[[plugins]]
repo = 'Shougo/deoplete.nvim'
on_event = 'InsertEnter'
hook_add = '''
source ~/.config/nvim/plugins/deoplete.vim
'''

[[plugins]]
repo ='mattn/emmet-vim'
on_ft = ['html','css']
hook_add = '''
source ~/.config/nvim/plugins/emmet.vim
'''

[[plugins]]
repo = 'junegunn/fzf.vim'
on_cmd = ['FZFToggle']
hook_add = '''
source ~/.config/nvim/plugins/fzf.vim
'''

[[plugins]]
repo = 'othree/html5.vim'
on_ft = 'html'

[[plugins]]
repo = 'sjl/gundo.vim'
on_cmd = ['GundoToggle']

[[plugins]]
repo = 'Shougo/neosnippet.vim'
hook_add = '''
source ~/.config/nvim/plugins/neosnippet.vim
'''
on_i  = 1
on_ft = ['snippet']
depends = ['neosnippet-snippets']

[[plugins]]
repo = 'majutsushi/tagbar'
on_cmd = ['TagbarToggle']

[[plugins]]
repo = 'hail2u/vim-css3-syntax'
on_ft = 'css'

[[plugins]]
repo = 'gko/vim-coloresque'
on_ft = 'css'

[[plugins]]
repo = 'nvie/vim-flake8'
on_ft = 'py'

[[plugins]]
repo = 'ycm-core/YouCompleteMe'
on_ft = 'py'
hook_add = '''
source ~/.config/nvim/plugins/youcompleteme.vim
'''
